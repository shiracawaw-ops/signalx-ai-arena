kind = "web"
previewPath = "/"
title = "SignalX AI Arena"
version = "1.0.0"
id = "artifacts/signalx-arena"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24952

[services.development]
run = "pnpm --filter @workspace/signalx-arena run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/signalx-arena", "run", "build" ]
publicDir = "artifacts/signalx-arena/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24952"
BASE_PATH = "/"
