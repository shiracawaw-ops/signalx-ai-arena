name: Build Windows EXE
on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - run: pnpm install --frozen-lockfile
      - working-directory: artifacts/signalx-arena
        run: pnpm run build:electron
        env: { NODE_ENV: production }
      - working-directory: artifacts/api-server
        run: pnpm run build
        env: { NODE_ENV: production }
      - run: npx electron-builder --win --config electron-builder.yml
        env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}", NODE_ENV: production }
      - uses: actions/upload-artifact@v4
        with:
          name: SignalX-AI-Arena-Windows
          path: dist-electron/*.exe
          retention-days: 30
