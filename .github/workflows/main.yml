name: Build Windows EXE
on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  test:
    # Fast routing/unit smoke checks. Runs on every push & PR so we catch
    # regressions like the blank-window Electron router bug (task #31)
    # without waiting for the Windows packaging job.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - run: pnpm install --frozen-lockfile
      - name: Build Electron bundle (needed by routing smoke test)
        working-directory: artifacts/signalx-arena
        run: pnpm run build:electron
        env: { NODE_ENV: production }
      - name: Run unit & routing smoke tests
        run: pnpm -r --if-present run test
  build-windows:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - run: pnpm install --frozen-lockfile
      - working-directory: artifacts/signalx-arena
        run: pnpm run build:electron
        env: { NODE_ENV: production }
      - working-directory: artifacts/api-server
        run: pnpm run build
        env: { NODE_ENV: production }
      - run: npx electron-builder --win --config electron-builder.yml
        env: { GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}", NODE_ENV: production }
      - name: Verify packaged frontend assets
        shell: pwsh
        run: |
          $unpacked = "dist-electron/win-unpacked/resources/frontend"
          if (-not (Test-Path "$unpacked/index.html")) {
            Write-Error "Missing $unpacked/index.html"; exit 1
          }
          $assets = Get-ChildItem "$unpacked/assets" -Filter "index-*.js" -ErrorAction SilentlyContinue
          if (-not $assets) {
            Write-Error "Missing $unpacked/assets/index-*.js"; exit 1
          }
          $html = Get-Content "$unpacked/index.html" -Raw
          if ($html -match "serviceWorker\.register|/sw\.js|/registerSW\.js") {
            Write-Error "index.html unexpectedly contains a service worker registration"; exit 1
          }
          Write-Host "Frontend assets OK: index.html + $($assets.Count) entry chunk(s)"
      - name: Smoke-test packaged Electron app
        # Launches the packaged .exe inside a real Chromium BrowserWindow and
        # asserts the sign-in UI is visible. Catches blank-window regressions
        # (preload errors, asset-path issues, CSP violations, missing native
        # modules) that the jsdom routing test in `test` cannot detect.
        shell: pwsh
        run: |
          # Install playwright-core into an isolated dir so it doesn't trip
          # the repo's `preinstall` hook (which insists on pnpm) or mutate
          # the workspace lockfile.
          New-Item -ItemType Directory -Force -Path .smoke-test | Out-Null
          Set-Location .smoke-test
          npm init -y | Out-Null
          npm install --no-package-lock playwright-core@1.49.1
          Set-Location ..
          $env:NODE_PATH = "$PWD/.smoke-test/node_modules"
          node scripts/electron-smoke-test.mjs
        env: { NODE_ENV: production }
      - uses: actions/upload-artifact@v4
        with:
          name: SignalX-AI-Arena-Windows
          path: dist-electron/*.exe
          retention-days: 30
