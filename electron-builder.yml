# ─── electron-builder configuration ─────────────────────────────────────────────
# Produces:
#   Windows → NSIS installer (.exe) + Portable (.exe)
#   macOS   → DMG
#   Linux   → AppImage

appId:       ai.signalx.arena
productName: SignalX AI Arena
copyright:   Copyright © 2024 SignalX

# ── Source (electron main process files) ───────────────────────────────────────
directories:
  # Output to top-level dist-electron/ so the GitHub Actions upload-artifact
  # step (which reads from dist-electron/*.exe) picks up the installer.
  output:         dist-electron
  buildResources: electron

# Note: the electron entry point is declared in package.json's "main" field,
# not here (electron-builder doesn't accept "main" at the root of its config).

files:
  - electron/main.js
  - electron/preload.js
  - electron/error.html
  - electron/error-preload.js

# Extra resources bundled outside the asar archive (readable by Node.js at runtime)
extraResources:
  # Built Vite frontend → resources/frontend/
  - from: "artifacts/signalx-arena/dist-electron"
    to:   "frontend"
    filter: ["**/*"]
  # Built API server bundle → resources/api-server/dist/
  - from: "artifacts/api-server/dist"
    to:   "api-server/dist"
    filter: ["**/*.mjs", "**/*.mjs.map"]

# ── Windows ────────────────────────────────────────────────────────────────────
win:
  icon:   electron/icon.png
  target:
    - target: nsis
      arch:   [x64]
    - target: portable
      arch:   [x64]
  artifactName: "SignalX-AI-Arena-${version}-Setup.${ext}"

nsis:
  oneClick:          false
  perMachine:        false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName:      "SignalX AI Arena"
  installerHeaderIcon: electron/icon.png

portable:
  artifactName: "SignalX-AI-Arena-${version}-Portable.exe"

# ── macOS ──────────────────────────────────────────────────────────────────────
mac:
  icon:     electron/icon.png
  category: public.app-category.finance
  target:
    - target: dmg
      arch:   [x64, arm64]

# ── Linux ─────────────────────────────────────────────────────────────────────
linux:
  icon:     electron/icon.png
  category: Finance
  target:
    - target: AppImage
      arch:   [x64]
  artifactName: "SignalX-AI-Arena-${version}.${ext}"
